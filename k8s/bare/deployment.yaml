apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-deployment-bare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-app-bare
  template:
    metadata:
      labels:
        app: qwen-app-bare
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: qwen-app-bare-containers
          image: IMAGE_NAME
          imagePullPolicy: Always
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen2-1.5B-Instruct"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /ping
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ping
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "8Gi"
              cpu: "1000m"
            requests:
              nvidia.com/gpu: 1
              memory: "8Gi"
              cpu: "1000m"
