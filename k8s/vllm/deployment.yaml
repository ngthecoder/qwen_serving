apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-deployment-vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-app-vllm
  template:
    metadata:
      labels:
        app: qwen-app-vllm
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: qwen-app-vllm-container
          image: <TBD>
          imagePullPolicy: Always
          args:
            - --model
            - Qwen/Qwen2-1.5B-Instruct
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --max-model-len
            - "2048"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "8Gi"
              cpu: "1000m"
            requests:
              nvidia.com/gpu: 1
              memory: "8Gi"
              cpu: "1000m"
